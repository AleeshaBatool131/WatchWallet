{% extends 'Watch_Wallet_app/base.html' %}

{% block title %}Delete Budget - WatchWallet{% endblock %}

{% block content %}
<h1>Delete {{ object_name|title }}</h1>

<div class="card danger">
    <h3>Are you sure?</h3>
    <p>You are about to delete: <strong>{{ object }}</strong></p>
    <p>This action cannot be undone.</p>
    
    <form method="POST" style="margin-top: 20px;">
        {% csrf_token %}
        <div class="button-group">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'budget_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
